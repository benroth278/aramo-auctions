<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Aramo Admin</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<style>
  :root {
    --bg: #f5f7fa; --surface: #fff; --border: #e2e8f0;
    --text: #1a1a1a; --muted: #64748b; --accent: #1d4ed8;
    --danger: #dc2626; --ok: #15803d; --warn: #d97706;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: env(safe-area-inset-bottom); }

  header {
    background: var(--text); color: #fff;
    padding: 16px 20px;
    padding-top: calc(16px + env(safe-area-inset-top));
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 50;
  }
  header h1 { font-size: 17px; font-weight: 700; }
  header p { font-size: 11px; opacity: 0.55; margin-top: 1px; }
  .header-link { color: #fff; font-size: 13px; text-decoration: none; opacity: 0.8; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* PIN */
  .pin-wrap { display: flex; flex-direction: column; align-items: center; padding: 60px 32px 40px; gap: 24px; }
  .pin-title { font-size: 22px; font-weight: 700; }
  .pin-subtitle { font-size: 14px; color: var(--muted); text-align: center; line-height: 1.5; }
  .pin-dots { display: flex; gap: 12px; margin: 8px 0; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--border); transition: background 0.15s; }
  .pin-dot.filled { background: var(--text); }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-key { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; font-size: 20px; font-weight: 600; cursor: pointer; text-align: center; user-select: none; }
  .pin-key:active { background: var(--border); }
  .pin-key.del { font-size: 16px; color: var(--danger); }
  .pin-error { color: var(--danger); font-size: 13px; min-height: 18px; }

  /* Setup */
  .setup-wrap { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }

  /* Sections & fields */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 12px 16px 8px; }
  .field { border-top: 1px solid var(--border); }
  .field:first-of-type { border-top: none; }
  .field label { display: block; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 16px 4px; }
  .field input, .field select { display: block; width: 100%; padding: 0 16px 12px; border: none; outline: none; background: transparent; font-size: 15px; color: var(--text); font-family: inherit; -webkit-appearance: none; }
  .field input:disabled { color: var(--muted); }

  /* URL row with fetch button */
  .url-row { display: flex; align-items: stretch; border-top: 1px solid var(--border); }
  .url-row input { flex: 1; padding: 12px 16px; border: none; outline: none; background: transparent; font-size: 15px; color: var(--text); font-family: inherit; min-width: 0; }
  .btn-fetch { flex-shrink: 0; padding: 0 16px; border: none; border-left: 1px solid var(--border); background: transparent; font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer; font-family: inherit; white-space: nowrap; }
  .btn-fetch:active { background: var(--bg); }
  .btn-fetch:disabled { color: var(--muted); pointer-events: none; }

  /* Fetch status */
  .fetch-status { padding: 8px 16px 10px; font-size: 12px; display: none; }
  .fetch-status.show { display: block; }
  .fetch-status.loading { color: var(--muted); }
  .fetch-status.ok      { color: var(--ok); }
  .fetch-status.partial { color: var(--warn); }
  .fetch-status.error   { color: var(--danger); }

  /* Buttons */
  .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; text-align: center; }
  .btn-primary { background: var(--text); color: #fff; }
  .btn-primary:active { opacity: 0.8; }
  .btn-danger-outline { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
  .btn:disabled { opacity: 0.4; pointer-events: none; }

  /* Main */
  .main-wrap { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* Auction rows */
  .auction-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .auction-header { padding: 12px 16px 6px; display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .auction-title-text { font-size: 14px; font-weight: 600; line-height: 1.3; flex: 1; }
  .auction-meta { font-size: 12px; color: var(--muted); padding: 0 16px 10px; }
  .auction-actions { border-top: 1px solid var(--border); display: flex; }
  .bid-input-wrap { flex: 1; display: flex; align-items: center; padding: 0 12px; }
  .bid-input { border: none; outline: none; font-size: 14px; font-weight: 600; background: transparent; width: 100%; font-family: inherit; padding: 10px 0; }
  .btn-row { display: flex; border-left: 1px solid var(--border); }
  .btn-sm { padding: 10px 14px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; background: transparent; font-family: inherit; }
  .btn-sm + .btn-sm { border-left: 1px solid var(--border); }
  .btn-sm-ok { color: var(--ok); }
  .btn-sm-danger { color: var(--danger); }
  .btn-sm:active { background: var(--bg); }

  /* Badge */
  .badge { flex-shrink: 0; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-Klaravik  { background: #fef3c7; color: #92400e; }
  .badge-Blinto    { background: #dbeafe; color: #1d4ed8; }
  .badge-Junora    { background: #f3e8ff; color: #6d28d9; }
  .badge-Maskinera { background: #dcfce7; color: #15803d; }
  .badge-Other     { background: #f1f5f9; color: #64748b; }

  .empty-state { text-align: center; padding: 32px; color: var(--muted); font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed; bottom: calc(24px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.err { background: var(--danger); }

  /* Override fields section - collapsible */
  .override-toggle { padding: 10px 16px; font-size: 12px; color: var(--accent); cursor: pointer; border-top: 1px solid var(--border); background: none; border-left: none; border-right: none; border-bottom: none; width: 100%; text-align: left; font-family: inherit; }
  .override-fields { display: none; }
  .override-fields.open { display: block; }
</style>
</head>
<body>


<header>
  <div>
    <h1>Aramo Admin</h1>
    <p>Auktionshantering</p>
  </div>
  <a href="index.html" class="header-link">‚Üê Tillbaka</a>
</header>

<!-- PIN screen -->
<div class="screen active" id="screen-pin">
  <div class="pin-wrap">
    <div style="text-align:center">

<!-- Setup -->
<div class="screen" id="screen-setup">
  <div class="setup-wrap">
    <p style="font-size:14px;color:var(--muted);line-height:1.6">T√§kkommen! Ange din GitHub-token och v√§lj evt PIN-kod. Token sparas bara p√• den h√§r enheten.</p>
    <div class="section">
      <div class="section-title">GitHub-token</div>

        <input type="password" id="setup-token" placeholder="ghp_‚Ä¶" autocomplete="off" spellcheck="false">
      </div>

      <div class="section-title">V»vlj PIN-kod</div>
      <div class="field">
        <label>4-siffrig PIN</label>

<!-- Main -->
<div class="screen" id="screen-main">
  <div class="main-wrap">

    <!-- Add form -->
    <div class="section">
      <div class="section-title">L√§gg till auktion</div>

      <!-- URL + fetch button -->
      <div class="url-row">
        <input type="url" id="add-url" placeholder="Klistra in URL‚Ä¶" inputmode="url" autocomplete="off"
               oninput="onUrlInput()" onpaste="onUrlPaste()">
        <button class="btn-fetch" id="btn-fetch" onclick="fetchAuction()">H√§mta ‚Üí</button>
      </div>

      <!-- Fetch status -->

      <!-- Override fields (shown after fetch or manually) -->
      <button class="override-toggle" id="override-toggle" onclick="toggleOverride()" style="display:none">
        $‚úé Redigera f√§lt manuellt
      </button>
      <div class="override-fields" id="override-fields">

          <label>Titel</label>
          <input type="text" id="add-title" placeholder="Maskinnamn">
        </div>
        <div class="field">
          <label>Ledande bud</label>

        </div>
        <div class="field">
          <label>Avslutas</label>

        </div>
        <div class="field">

          <select id="add-platform">
            <option value="Junora">Junora</option>

          </select>

      </div>

      <div style="padding:12px 16px;">
        <button class="btn btn-primary" id="btn-add" onclick="addAuction()" disabled>L√§gg till</button>
      </div>
    </div>

    <!-- Auction list -->
    <div class="section-title" style="padding:4px 4px;">Aktiva auktioner</div>
    <div id="auction-list"><div class="empty-state">Laddar‚Ä¶</div></div>

    <!-- Reset -->
    <div style="padding:4px 0 0;">
      <button class="btn btn-danger-outline" onclick="resetSettings()">√Öterst√§ll inst√§llningar</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OWNER = 'benroth278';
const REPO  = 'aramo-auctions';
const FILE  = 'data.json';

// ‚îÄ‚îÄ Util ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

const getToken = () => localStorage.getItem('aramo_token');
const getPin   = () => localStorage.getItem('aramo_pin');

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

let _tt;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2800);
}

function detectPlatform(url) {
  if (/klaravik/.test(url))  return 'Klaravik';
  if (/blinto/.test(url))    return 'Blinto';
  if (/junora/.test(url))    return 'Junora';
  if (/maskinera/.test(url)) return 'Maskinera';
  return 'Other';
}

function fmtDate(iso) {
  if (!iso) return '‚Äî';
  return new Date(iso).toLocaleString('sv-SE', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

// ‚îÄ‚îÄ PIN ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

let pinBuf = '';

function initPin() {
  if (!getToken() || !getPin()) { show('setup'); return; }
  show('pin');
}

function pinKey(k) {
  if (pinBuf.length >= 4) return;
  pinBuf += k; updateDots();
  if (pinBuf.length === 4) setTimeout(checkPin, 120);
}

function pinDel() {
  pinBuf = pinBuf.slice(0, -1); updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuf.length);
}

function checkPin() {
  if (pinBuf === getPin()) {
    pinBuf = ''; updateDots(); show('main'); loadAuctions();
  } else {
    document.getElementById('pin-error').textContent = 'Fel PIN, f√∂rs√∂k igen';
    pinBuf = ''; updateDots();
  }
}

// ‚îÄ‚îÄ Setup ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

function setupSave() {
  const token = document.getElementById('setup-token').value.trim();
  const pin   = document.getElementById('setup-pin').value.trim();
  if (!token) { toast('Ange en GitHub-token', true); return; }
  if (!/^\d{4}$/.test(pin)) { toast('PIN m√•ste vara 4 siffror', true); return; }
  localStorage.setItem('aramo_token', token);
  localStorage.setItem('aramo_pin', pin);
  show('main'); loadAuctions();
}

function resetSettings() {
  if (!confirm('√Öterst√§ll? Du beh√∂ver ange token och PIN igen.')) return;
  localStorage.removeItem('aramo_token');
  localStorage.removeItem('aramo_pin');
  location.reload();
}

// ‚îÄ‚îÄ Auto-fetch from URL ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

let _pasteTimer;

function onUrlInput() {
  const url = document.getElementById('add-url').value.trim();
  document.getElementById('add-platform').value = detectPlatform(url);
}

function onUrlPaste() {
  clearTimeout(_pasteTimer);
  _pasteTimer = setTimeout(() => {
    const url = document.getElementById('add-url').value.trim();
    if (url.startsWith('http')) fetchAuction();
  }, 400);
}

function setFetchStatus(cls, msg) {
  const el = document.getElementById('fetch-status');
  el.className = 'fetch-status show ' + cls;
  el.textContent = msg;
}

async function proxyFetch(url) {
  const proxies = [
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://corsproxy.io/?' + encodeURIComponent(url),
  ];
  for (const p of proxies) {
    try {
      const res = await fetch(p, { signal: AbortSignal.timeout(12000) });
      if (!res.ok) continue;
      const text = await res.text();
      if (text.length > 200) return text;
    } catch {}
  }
  return null;
}

function parseHtml(html, url) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // ‚îÄ‚îÄ Title ‚îÄ‚îÄ
  let title =
    doc.querySelector('meta[property="og:title"]')?.getAttribute('content') ||
    doc.querySelector('meta[name="twitter:title"]')?.getAttribute('content') ||
    doc.querySelector('h1')?.textContent?.trim() ||
    doc.querySelector('title')?.textContent?.trim() || '';

  // Strip site name suffixes like " | Junora", " - Klaravik"
  title = title.replace(/\s*[-‚Äì|]\s*(Junora|Klaravik|Blinto|Maskinera|Mascus)[^]*$/i, '').trim();

  // ‚îÄ‚îÄ JSON-LD structured data ‚îÄ‚îÄ
  let bidText = null;
  let endsAtISO = null;

  for (const script of doc.querySelectorAll('script[type="application/ld+json"]')) {
    try {
      const items = [].concat(JSON.parse(script.textContent));
      for (const d of items) {
        // Price
        if (d.offers?.price != null && !bidText) {
          const num = parseFloat(d.offers.price);
          if (!isNaN(num)) bidText = num.toLocaleString('sv-SE') + ' kr';
        }
        // End time
        for (const key of ['endDate', 'validThrough', 'auctionEnd']) {
          if (d[key] && !endsAtISO) endsAtISO = d[key];
        }
        // Nested
        if (d.offers?.availabilityEnds && !endsAtISO) endsAtISO = d.offers.availabilityEnds;
      }
    } catch {}
  }

  // ‚îÄ‚îÄ Platform-specific fallbacks ‚îÄ‚îÄ
  if (/junora/.test(url)) {
    if (!bidText) {
      const el = doc.querySelector('.price, [class*="price"], [class*="bid"], [class*="Price"]');
      if (el) bidText = el.textContent.replace(/[^\d\s]/g, '').trim() + ' kr';
    }
    if (!endsAtISO) {
      const el = doc.querySelector('time[datetime], [data-end], [class*="countdown"]');
      if (el?.getAttribute('datetime')) endsAtISO = el.getAttribute('datetime');
    }
  }

  if (/klaravik/.test(url)) {
    if (!endsAtISO) {
      const el = doc.querySelector('[data-end-at], [data-auction-end], time');
      if (el?.getAttribute('datetime') || el?.getAttribute('data-end-at')) {
        endsAtISO = el.getAttribute('datetime') || el.getAttribute('data-end-at');
      }
    }
  }

  return { title, bidText, endsAtISO };
}

async function fetchAuction() {
  const url = document.getElementById('add-url').value.trim();
  if (!url || !url.startsWith('http')) {
    toast('Ange en giltig URL', true); return;
  }

  const fetchBtn = document.getElementById('btn-fetch');
  fetchBtn.disabled = true;
  fetchBtn.textContent = '‚Ä¶';
  setFetchStatus('loading', 'H√§mtar auktionsdata‚Ä¶');
  document.getElementById('override-toggle').style.display = 'none';

  const html = await proxyFetch(url);

  fetchBtn.disabled = false;
  fetchBtn.textContent = 'H√§mta ‚Üí';

  if (!html) {
    setFetchStatus('error', '‚úó Kunde inte h√§mta sidan ‚Äî fyll i f√§lten manuellt');
    document.getElementById('override-toggle').style.display = 'block';
    openOverride();
    document.getElementById('btn-add').disabled = false;
    return;
  }

  const { title, bidText, endsAtISO } = parseHtml(html, url);

  // Pre-fill fields
  if (title) document.getElementById('add-title').value = title;
  if (bidText) document.getElementById('add-bid').value = bidText;
  if (endsAtISO) {
    // Convert to datetime-local format (YYYY-MM-DDTHH:MM)
    try {
      const d = new Date(endsAtISO);
      const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000)
        .toISOString().slice(0, 16);
      document.getElementById('add-ends').value = local;
    } catch {}
  }
  document.getElementById('add-platform').value = detectPlatform(url);

  const found = [title && 'titel', bidText && 'bud', endsAtISO && 'sluttid'].filter(Boolean);
  const missing = [!title && 'titel', !bidText && 'bud', !endsAtISO && 'sluttid'].filter(Boolean);

  if (missing.length === 0) {
    setFetchStatus('ok', '‚úì Hittade titel, bud och sluttid');
  } else if (found.length > 0) {
    setFetchStatus('partial',
      '‚öÝ Hittade ' + found.join(', ') + ' ¬∑ Saknar ' + missing.join(', ') + ' ‚Äî fyll i manuellt');
    openOverride();
  } else {
    setFetchStatus('error', '‚úó Ingen data hittades ‚Äî fyll i f√§lten manuellt');
    openOverride();
  }

  document.getElementById('override-toggle').style.display = 'block';
  document.getElementById('btn-add').disabled = false;
}

function toggleOverride() {
  const el = document.getElementById('override-fields');
  const btn = document.getElementById('override-toggle');
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    btn.textContent = '‚úé Redigera f√§lt manuellt';
  } else {
    openOverride();
  }
}

function openOverride() {
  document.getElementById('override-fields').classList.add('open');
  document.getElementById('override-toggle').textContent = '‚ñ≤ D√∂lj f√§lt';
}

// ‚îÄ‚îÄ GitHub API ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

async function fetchData() {
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
    headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error('GitHub ' + res.status);
  const meta = await res.json();
  return { data: JSON.parse(atob(meta.content.replace(/\n/g, ''))), sha: meta.sha };
}

async function pushData(data, sha, message) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`, {
    method: 'PUT',
    headers: { Authorization: `token ${getToken()}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content, sha })
  });
  if (!res.ok) throw new Error('GitHub ' + res.status);
  return (await res.json()).content.sha;
}

// ‚îÄ‚îÄ State ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

let currentSha = null, currentData = null;

async function loadAuctions() {
  try {
    const { data, sha } = await fetchData();
    currentData = data; currentSha = sha;
    renderAuctions();
  } catch (e) {
    document.getElementById('auction-list').innerHTML = `<div class="empty-state">Fel: ${e.message}</div>`;
  }
}

function renderAuctions() {
  const list = document.getElementById('auction-list');
  const auctions = currentData?.auctions || [];
  if (!auctions.length) { list.innerHTML = '<div class="empty-state">Inga auktioner</div>'; return; }
  list.innerHTML = auctions.map((a, i) => {
    const p = a.platform || detectPlatform(a.url);
    return `
      <div class="auction-item">
        <div class="auction-header">
          <span class="auction-title-text">${a.title || a.url}</span>
          <span class="badge badge-${p}">${p}</span>
        </div>
        <div class="auction-meta">Avslutas ${fmtDate(a.endsAtISO)}</div>
        <div class="auction-actions">
          <div class="bid-input-wrap">
            <input class="bid-input" type="text" value="${a.currentBidText || ''}" id="bid-${i}" placeholder="Ledande bud">
          </div>
          <div class="btn-row">
            <button class="btn-sm btn-sm-ok" onclick="updateBid(${i})">Spara</button>
            <button class="btn-sm btn-sm-danger" onclick="deleteAuction(${i})">Ta bort</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function updateBid(i) {
  const newBid = document.getElementById('bid-' + i).value.trim();
  currentData.auctions[i].currentBidText = newBid;
  currentData.auctions[i].currentBidNum  = parseInt(newBid.replace(/\D/g, '')) || 0;
  currentData.updatedAt = new Date().toISOString();
  try { currentSha = await pushData(currentData, currentSha, `Update bid: ${currentData.auctions[i].title}`); toast('Bud uppdaterat ‚úì'); }
  catch (e) { toast('Fel: ' + e.message, true); await loadAuctions(); }
}

async function deleteAuction(i) {
  const title = currentData.auctions[i].title || 'auktionen';
  if (!confirm(`Ta bort "${title}"?`)) return;
  currentData.auctions.splice(i, 1);
  currentData.updatedAt = new Date().toISOString();
  try { currentSha = await pushData(currentData, currentSha, `Remove: ${title}`); renderAuctions(); toast('Borttagen ‚úì'); }
  catch (e) { toast('Fel: ' + e.message, true); await loadAuctions(); }
}

async function addAuction() {
  const url      = document.getElementById('add-url').value.trim();
  const title    = document.getElementById('add-title').value.trim();
  const bid      = document.getElementById('add-bid').value.trim();
  const endsAt   = document.getElementById('add-ends').value;
  const platform = document.getElementById('add-platform').value;

  if (!url)   { toast('Ange en URL', true); return; }
  if (!title) { toast('Titel saknas ‚Äî fyll i manuellt', true); openOverride(); return; }

  const btn = document.getElementById('btn-add');
  btn.disabled = true; btn.textContent = 'Sparar‚Ä¶';

  const item = {
    url, title, platform,
    currentBidText: bid || '0 kr',
    currentBidNum:  parseInt(bid.replace(/\D/g, '')) || 0,
    endsAtISO:  endsAt ? new Date(endsAt).toISOString() : null,
    fetchedAt:  new Date().toISOString()
  };

  currentData.auctions.push(item);
  currentData.updatedAt = new Date().toISOString();

  try {
    currentSha = await pushData(currentData, currentSha, `Add: ${title}`);
    // Reset form
    document.getElementById('add-url').value = '';
    document.getElementById('add-title').value = '';
    document.getElementById('add-bid').value = '';
    document.getElementById('add-ends').value = '';
    document.getElementById('fetch-status').className = 'fetch-status';
    document.getElementById('override-toggle').style.display = 'none';
    document.getElementById('override-fields').classList.remove('open');
    btn.disabled = true;
    renderAuctions();
    toast('Auktion tillagd ‚úì');
  } catch (e) {
    currentData.auctions.pop();
    toast('Fel: ' + e.message, true);
    btn.disabled = false;
  }

  btn.textContent = 'L√§gg till';
}

// ‚îÄ‚îÄ Init ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
initPin();
